name: Build

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
        - "drivers/incluster"
        - "drivers/aws"
        - "may"
        container_tool:
        - "docker"
        - "podman"
        - "buildah"


    defaults:
      run:
        working-directory: "./${{ matrix.component }}"

    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Running Tests
        env:
          CONTAINER_TOOL: '${{matrix.container_tool}}'
        run: make docker-build
