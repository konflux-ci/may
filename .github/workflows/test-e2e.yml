name: E2E Tests

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    # Required for OIDC authentication with Codecov
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
        - component: "drivers/incluster"
          namespace: "may-system"
          label_selector: "control-plane=incluster-driver"
        - component: "drivers/aws"
          namespace: "driver-aws-system"
          label_selector: "control-plane=controller-manager"
        - component: "drivers/ibm"
          namespace: "driver-ibm-system"
          label_selector: "control-plane=controller-manager"
        - component: "may"
          namespace: "may-system"
          label_selector: "control-plane=controller-manager"

    defaults:
      run:
        working-directory: "./${{ matrix.component }}"

    env:
      ENABLE_COVERAGE: "true"

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "${{ matrix.component }}/go.mod"

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run e2e tests with coverage instrumentation
        run: |
          go mod tidy
          make test-e2e

      - name: Collect e2e coverage from instrumented pods
        if: always()
        run: |
          mkdir -p coverage-output && chmod 777 coverage-output
          cp $HOME/.kube/config /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
          podman run --rm \
            --network host \
            -v /tmp/kubeconfig:/kubeconfig:ro \
            -v $PWD/coverage-output:/workspace/coverage-output \
            -e KUBECONFIG=/kubeconfig \
            quay.io/konflux-ci/konflux-devprod/coverport-cli \
            collect \
              --namespace=${{ matrix.namespace }} \
              --label-selector=${{ matrix.label_selector }} \
              --test-name=e2e-tests \
              --output=/workspace/coverage-output || true

      - name: Upload e2e coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: e2e-tests
          directory: coverage-output
          fail_ci_if_error: false

      - name: Cleanup Kind cluster
        if: always()
        run: make cleanup-test-e2e

  test-e2e-smoke:
    name: Smoke tests (may)
    runs-on: ubuntu-latest
    # Required for OIDC authentication with Codecov
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: "./may"

    env:
      ENABLE_COVERAGE: "true"

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "may/go.mod"

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run smoke tests with coverage instrumentation
        run: |
          go mod tidy
          make test-e2e-smoke

      - name: Collect e2e coverage from instrumented pods
        if: always()
        run: |
          mkdir -p coverage-output && chmod 777 coverage-output
          cp $HOME/.kube/config /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
          podman run --rm \
            --network host \
            -v /tmp/kubeconfig:/kubeconfig:ro \
            -v $PWD/coverage-output:/workspace/coverage-output \
            -e KUBECONFIG=/kubeconfig \
            quay.io/konflux-ci/konflux-devprod/coverport-cli \
            collect \
              --namespace=may-system \
              --label-selector=control-plane=controller-manager \
              --test-name=e2e-tests \
              --output=/workspace/coverage-output || true

      - name: Upload e2e smoke coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: e2e-tests
          directory: coverage-output
          fail_ci_if_error: false

      - name: Cleanup Kind cluster
        if: always()
        run: make cleanup-test-e2e
