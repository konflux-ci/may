codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

flags:
  unit-tests:
    carryforward: true
  e2e-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
  behavior: default
