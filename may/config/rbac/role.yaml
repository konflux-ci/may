  - update
- apiGroups:
  - may.konflux-ci.dev
  resources:
  - claims/status
  - dynamichostautoscalers/status
  - dynamichosts/status
  - runners/status
  - statichosts/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - may.konflux-ci.dev
  resources:
  - runners
  - statichosts
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
