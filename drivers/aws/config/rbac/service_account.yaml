apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: driver-aws
    app.kubernetes.io/managed-by: kustomize
  name: controller-manager
  namespace: system
  # This ServiceAccount's identity (system:serviceaccount:system:controller-manager)
  # must appear in the IAM role trust policy "sub" condition for AWS web-identity
  # auth. See config/manager/aws_web_identity_patch.yaml and AGENTS.md.
